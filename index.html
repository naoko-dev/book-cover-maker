<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLO 書影メーカー</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F4F1EA; color: #2B2B2B; font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif; }
  input, select, textarea, button { font-family: inherit; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 16px 60px; }
  .card { background: #fff; border: 2px solid #E4DFD3; border-radius: 18px; padding: 22px; }
  .label { font-size: 13px; font-weight: 800; color: #0B5C2E; margin: 0 0 6px; display: block; }
  .inp { width: 100%; border: 2px solid #E4DFD3; border-radius: 12px; padding: 10px 14px; font-size: 14px; outline: none; }
  .row { margin-bottom: 16px; }
  .btn { background: #0B5C2E; color: #fff; border: none; border-radius: 999px; padding: 14px 34px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn2 { background: #fff; color: #0B5C2E; border: 2px solid #0B5C2E; border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 800; cursor: pointer; }
  .preset { border: 2.5px solid #E4DFD3; border-radius: 12px; padding: 10px; cursor: pointer; background: #fff; text-align: left; }
  .preset.on { border-color: #0B5C2E; background: #ECF5EF; }
  .err { background: #FBEAE4; border: 2px solid #F0C3B4; border-radius: 12px; padding: 12px 16px; color: #B23A1E; font-weight: 800; font-size: 13px; margin-top: 14px; }
  .muted { color: #8A8472; font-size: 12px; line-height: 1.7; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .grid { display: grid; grid-template-columns: 1fr 360px; gap: 22px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .seg { display: inline-flex; border: 2px solid #E4DFD3; border-radius: 10px; overflow: hidden; }
  .seg button { border: none; background: #fff; padding: 7px 12px; font-size: 12px; font-weight: 800; cursor: pointer; color: #2B2B2B; }
  .seg button.on { background: #0B5C2E; color: #fff; }
  .adj { background: #FAF8F2; border: 2px solid #E4DFD3; border-radius: 14px; padding: 16px; margin-top: 16px; }
  .adjrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 8px; background: #ECF5EF; border: 2px solid #BBDEC8; border-radius: 999px; padding: 4px 6px 4px 12px; font-size: 12px; font-weight: 800; color: #0B5C2E; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===== 設定（あなたのSupabase）=====
var SUPABASE_URL = "https://xcxwvrgjkhtgksufplvw.supabase.co";
var PUBLISHABLE_KEY = "sb_publishable_eOkAEuN4FiFhwvtAGFdOmA_ZyNOwLdI";
var IMG_FN = SUPABASE_URL + "/functions/v1/generate-cover-image";

// 四六判 仕上がり 188mm×128mm（縦横比 188:128）。内部解像度 1024×1504、書き出し2倍。
var COVER = { w: 1024, h: 1504 };

var PRESETS = [
  { id: "watercolor", label: "水彩イラスト", desc: "やわらかく情緒的",
    style: function (t) { return "文字を一切含まない縦長の本の表紙イラスト。画風は上品な水彩。にじみとやわらかな光、情緒的な雰囲気。" + t + " 人物を描く場合は日本人・現代の服装で、うしろ姿や引きの構図にし顔を描き込みすぎない。画面の上部と下部にタイトルや帯を載せる余白をあける。文字・ロゴ・英字・署名・透かしは一切入れない。"; },
    pos: "bottom", color: "#FFFFFF", obiColor: "#0B3D2E", obiTextColor: "#FFFFFF", font: "mincho" },
  { id: "engraving", label: "銅版画調の肖像", desc: "重厚・セピア",
    style: function (t) { return "文字を一切含まない縦長の本の表紙イラスト。画風は銅版画（エッチング）調で、セピア〜モノトーンの細密な線描。重厚でクラシックな雰囲気。" + t + " 中央に象徴的なモチーフや人物の肖像を据える。上部と下部に文字用の余白をあける。文字・ロゴ・英字・透かしは一切入れない。"; },
    pos: "top", color: "#2A1C0E", obiColor: "#7A1F12", obiTextColor: "#FFF7E8", font: "mincho" },
  { id: "anime", label: "アニメ・ラノベ調", desc: "明るく鮮やか",
    style: function (t) { return "文字を一切含まない縦長の本の表紙イラスト。画風は明るく鮮やかなアニメ・ライトノベル調。クリーンな線と彩度の高い配色。" + t + " 現代的な日本人キャラクターを2人までで魅力的に描く。上部または下部に文字用の余白をあける。文字・ロゴ・英字・透かしは一切入れない。"; },
    pos: "top", color: "#FFFFFF", obiColor: "#163E8C", obiTextColor: "#FFFFFF", font: "maru" },
  { id: "photo", label: "写真・実写調", desc: "リアルで情感のある",
    style: function (t) { return "文字を一切含まない縦長の本の表紙にふさわしい写真調・実写的なイメージ。自然光、浅い被写界深度、情感のある構図。" + t + " 人物は日本人・現代の服装で、うしろ姿や手元など顔を特定しすぎない。上部と下部に文字用の余白をあける。文字・ロゴ・英字・透かしは一切入れない。"; },
    pos: "bottom", color: "#FFFFFF", obiColor: "#11332A", obiTextColor: "#FFFFFF", font: "mincho" },
  { id: "painting", label: "油彩・絵画調", desc: "豊かな筆致でクラシック",
    style: function (t) { return "文字を一切含まない縦長の本の表紙イラスト。画風は油彩・絵画調で、豊かな筆致と深みのある色彩。クラシックで上品な雰囲気。" + t + " 上部と下部に文字用の余白をあける。文字・ロゴ・英字・透かしは一切入れない。"; },
    pos: "bottom", color: "#FBF3E0", obiColor: "#3A2A12", obiTextColor: "#FBF3E0", font: "mincho" },
  { id: "minimal", label: "ミニマル・抽象", desc: "シンプルで洗練",
    style: function (t) { return "文字を一切含まない縦長の本の表紙イラスト。画風はミニマルで抽象的。少ない色数、余白を生かした洗練された構成、象徴的な一つのモチーフ。" + t + " 上部と下部に文字用の余白をあける。文字・ロゴ・英字・透かしは一切入れない。"; },
    pos: "top", color: "#222222", obiColor: "#222222", obiTextColor: "#FFFFFF", font: "gothic" },
];

var FONT_STACK = {
  mincho: "'Hiragino Mincho ProN','Yu Mincho','YuMincho','MS Mincho',serif",
  gothic: "'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif",
  maru: "'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',sans-serif",
};

function wrapByCount(text, per) {
  var lines = [];
  for (var i = 0; i < text.length; i += per) lines.push(text.slice(i, i + per));
  return lines;
}
function wrapTitle(title) {
  var len = title.length, per;
  if (len <= 8) per = len; else if (len <= 16) per = Math.ceil(len / 2);
  else if (len <= 24) per = Math.ceil(len / 3); else per = 9;
  return wrapByCount(title, Math.max(per, 1));
}
function isLight(hex) {
  if (typeof hex !== "string" || hex.charAt(0) !== "#") return true;
  var r = parseInt(hex.substr(1, 2), 16), g = parseInt(hex.substr(3, 2), 16), b = parseInt(hex.substr(5, 2), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) > 140;
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function extractImage(data) {
  if (!data) return null;
  function norm(s) { if (typeof s !== "string" || !s) return null; return (s.indexOf("data:") === 0 || s.indexOf("http") === 0) ? s : ("data:image/png;base64," + s); }
  if (data.image) return norm(data.image);
  if (data.url) return norm(data.url);
  if (data.b64_json) return "data:image/png;base64," + data.b64_json;
  if (data.data && data.data[0]) { var d = data.data[0]; if (d.b64_json) return "data:image/png;base64," + d.b64_json; if (d.url) return norm(d.url); }
  return null;
}
function loadImg(url, cors) {
  return new Promise(function (res, rej) {
    var im = new Image(); if (cors) im.crossOrigin = "anonymous";
    im.onload = function () { res(im); }; im.onerror = function () { rej(new Error("画像の読み込みに失敗")); };
    im.src = url;
  });
}

function composite(img, o) {
  var W = COVER.w, H = COVER.h, scale = o.scale || 2;
  var c = document.createElement("canvas"); c.width = W * scale; c.height = H * scale;
  var ctx = c.getContext("2d"); ctx.scale(scale, scale);
  var ir = img.width / img.height, cr = W / H, sw, sh, sx, sy;
  if (ir > cr) { sh = img.height; sw = sh * cr; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / cr; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);

  var font = FONT_STACK[o.font] || FONT_STACK.mincho;
  var hasObi = o.obi && o.obi.trim();
  var obiH = hasObi ? H * 0.15 : 0;
  var pos = o.pos || "top";
  var light = isLight(o.color);

  var tLines = wrapTitle(o.title);
  var per = Math.max.apply(null, tLines.map(function (l) { return l.length; }));
  var tSize = Math.min(W * 0.78 / Math.max(per, 1), W * 0.155) * (o.tscale || 1);
  tSize = Math.max(tSize, W * 0.05);
  var gap = tSize * 1.32;
  ctx.font = "700 " + tSize + "px " + font;
  var maxLineW = 0;
  for (var k = 0; k < tLines.length; k++) maxLineW = Math.max(maxLineW, ctx.measureText(tLines[k]).width);
  var hasAuthor = o.author && o.author.trim();
  var aSize = tSize * 0.34;
  var blockH = (tLines.length - 1) * gap + tSize + (hasAuthor ? aSize * 1.8 : 0);

  var areaTop = H * 0.06, areaBottom = (H - obiH) - H * 0.04;
  var cy;
  if (pos === "top") cy = areaTop + blockH / 2 + H * 0.04;
  else if (pos === "bottom") cy = areaBottom - blockH / 2;
  else cy = (areaTop + areaBottom) / 2;
  var topY = cy - blockH / 2;

  if (o.plate && o.plate !== "none") {
    var alpha = o.plate === "strong" ? 0.5 : 0.28;
    var padX = tSize * 0.7, padY = tSize * 0.55;
    var plateW = Math.min(maxLineW + padX * 2, W * 0.92);
    var plateH = blockH + padY * 2;
    var px = (W - plateW) / 2, py = topY - padY;
    ctx.fillStyle = light ? ("rgba(0,0,0," + alpha + ")") : ("rgba(255,255,255," + alpha + ")");
    roundRect(ctx, px, py, plateW, plateH, tSize * 0.3);
    ctx.fill();
  }

  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "700 " + tSize + "px " + font;
  ctx.lineJoin = "round";
  ctx.lineWidth = tSize * 0.14;
  ctx.strokeStyle = light ? "rgba(0,0,0,0.55)" : "rgba(255,255,255,0.7)";
  ctx.shadowColor = light ? "rgba(0,0,0,0.45)" : "rgba(255,255,255,0.35)";
  ctx.shadowBlur = tSize * 0.18;
  var ty0 = topY + tSize / 2;
  for (var i = 0; i < tLines.length; i++) {
    var yy = ty0 + i * gap;
    ctx.strokeText(tLines[i], W / 2, yy);
    ctx.fillStyle = o.color;
    ctx.fillText(tLines[i], W / 2, yy);
  }
  ctx.shadowBlur = 0;

  if (hasAuthor) {
    ctx.font = "500 " + aSize + "px " + font;
    ctx.lineWidth = aSize * 0.16; ctx.strokeStyle = light ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.6)";
    var ay = topY + (tLines.length - 1) * gap + tSize + aSize * 1.1;
    ctx.strokeText(o.author.trim(), W / 2, ay);
    ctx.fillStyle = o.color; ctx.fillText(o.author.trim(), W / 2, ay);
  }

  if (hasObi) {
    ctx.fillStyle = o.obiColor || "#0B3D2E"; ctx.fillRect(0, H - obiH, W, obiH);
    var ot = o.obi.trim();
    var oLines = ot.length > 16 ? wrapByCount(ot, Math.ceil(ot.length / 2)) : [ot];
    var oSize = Math.min(W * 0.9 / Math.max(oLines[0].length, 1), W * 0.07);
    ctx.font = "800 " + oSize + "px " + FONT_STACK.gothic; ctx.fillStyle = o.obiTextColor || "#FFFFFF";
    for (var j = 0; j < oLines.length; j++) ctx.fillText(oLines[j], W / 2, (H - obiH / 2) + (j - (oLines.length - 1) / 2) * oSize * 1.25);
  }
  return c.toDataURL("image/png");
}

function App() {
  var s = useState("水の中で咲け"); var title = s[0], setTitle = s[1];
  var a = useState(""); var author = a[0], setAuthor = a[1];
  var o = useState(""); var obi = o[0], setObi = o[1];
  var th = useState(""); var theme = th[0], setTheme = th[1];
  var pr = useState("watercolor"); var presetId = pr[0], setPresetId = pr[1];
  var rf = useState(""); var refImage = rf[0], setRefImage = rf[1];
  var bz = useState(""); var busy = bz[0], setBusy = bz[1];
  var er = useState(""); var err = er[0], setErr = er[1];
  var im = useState(""); var cover = im[0], setCover = im[1];

  var hb = useState(false); var hasBg = hb[0], setHasBg = hb[1];
  var ps = useState("bottom"); var pos = ps[0], setPos = ps[1];
  var ts = useState(1); var tscale = ts[0], setTscale = ts[1];
  var tc = useState("#FFFFFF"); var tcolor = tc[0], setTcolor = tc[1];
  var pl = useState("soft"); var plate = pl[0], setPlate = pl[1];
  var af = useState("mincho"); var activeFont = af[0], setActiveFont = af[1];
  var ao = useState({ c: "#0B3D2E", t: "#FFFFFF" }); var activeObi = ao[0], setActiveObi = ao[1];

  var bgRef = useRef(null);
  var preset = PRESETS.filter(function (p) { return p.id === presetId; })[0] || PRESETS[0];

  function recompose() {
    if (!bgRef.current) return;
    try {
      var png = composite(bgRef.current, {
        title: title.trim() || "（タイトル）", author: author, obi: obi,
        font: activeFont, pos: pos, tscale: tscale, color: tcolor, plate: plate,
        obiColor: activeObi.c, obiTextColor: activeObi.t, scale: 2,
      });
      setCover(png);
    } catch (e) { setErr("文字の書き出しに失敗しました（CORS制限の可能性）。"); }
  }

  useEffect(function () { if (hasBg) recompose(); }, [title, author, obi, pos, tscale, tcolor, plate, hasBg]);

  function onRefFile(e) {
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var r = new FileReader(); r.onload = function () { setRefImage(String(r.result)); }; r.readAsDataURL(f);
  }

  function run() {
    setErr("");
    if (!title.trim()) { setErr("タイトルを入力してください。"); return; }
    var themeText = theme.trim() ? ("作品の内容・テーマ: " + theme.trim() + "。") : "";
    var prompt = preset.style(themeText);
    if (refImage) prompt = prompt + " 添付の参考画像の色調・雰囲気・構図に似せること。";
    setBusy("AIがイラストを生成しています…（30秒〜1分ほど）");
    var body = { prompt: prompt, size: "portrait" };
    if (refImage) {
      var parts = refImage.split(",");
      body.reference = parts[1];
      var m = refImage.match(/^data:([^;]+);/);
      body.referenceMime = m ? m[1] : "image/png";
    }
    fetch(IMG_FN, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUBLISHABLE_KEY, "apikey": PUBLISHABLE_KEY },
      body: JSON.stringify(body),
    }).then(function (r) { return r.text().then(function (t) { return { ok: r.ok, status: r.status, t: t }; }); })
      .then(function (res) {
        var data = null; try { data = JSON.parse(res.t); } catch (e) {}
        if (!res.ok) throw new Error((data && (data.error || data.message)) || ("サーバーエラー " + res.status));
        if (data && data.error) throw new Error(typeof data.error === "string" ? data.error : "生成エラー");
        var url = extractImage(data);
        if (!url) throw new Error("画像が取得できませんでした");
        setBusy("文字を組版しています…");
        return loadImg(url, true).catch(function () { return loadImg(url, false); });
      })
      .then(function (img) {
        bgRef.current = img;
        setActiveFont(preset.font);
        setActiveObi({ c: preset.obiColor, t: preset.obiTextColor });
        setPos(preset.pos); setTcolor(preset.color); setTscale(1); setPlate("soft");
        setBusy(""); setHasBg(true);
      })
      .catch(function (e) { setErr("生成に失敗しました：" + (e && e.message ? e.message : "不明なエラー")); setBusy(""); });
  }

  function save() {
    if (!cover) return;
    var link = document.createElement("a");
    link.href = cover; link.download = (title || "書影").replace(/[\\/:*?"<>|]/g, "_") + "_書影_四六判.png";
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  }

  function Seg(props) {
    return (
      <div className="seg">
        {props.opts.map(function (op) {
          return <button key={op.v} className={props.value === op.v ? "on" : ""} onClick={function () { props.onChange(op.v); }}>{op.label}</button>;
        })}
      </div>
    );
  }

  return (
    <div className="wrap">
      <div style={{ marginBottom: 16 }}>
        <h1>📕 GLO 書影メーカー</h1>
        <div className="muted">タイトルや内容を入れて画風を選び、「書影を作る」を押すと、あなた専用の表紙イラストをAIが生成し、文字を重ねて完成書影にします。サイズは四六判（仕上がり188×128mm）。</div>
      </div>
      <div className="grid">
        <div className="card">
          <div className="row"><label className="label">タイトル</label><input className="inp" value={title} onChange={function (e) { setTitle(e.target.value); }} placeholder="作品タイトル" /></div>
          <div className="row"><label className="label">著者名・ペンネーム（任意）</label><input className="inp" value={author} onChange={function (e) { setAuthor(e.target.value); }} placeholder="例：白川 ことね" /></div>
          <div className="row"><label className="label">帯のキャッチコピー（任意）</label><input className="inp" value={obi} onChange={function (e) { setObi(e.target.value); }} placeholder="例：もう一度、恋をしてもいいですか。（空なら帯なし）" /></div>
          <div className="row"><label className="label">作品の内容・テーマ（任意）</label><textarea className="inp" rows="2" value={theme} onChange={function (e) { setTheme(e.target.value); }} placeholder="例：温泉地を舞台にした大人の恋愛" /></div>

          <div className="row">
            <label className="label">画風プリセット</label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {PRESETS.map(function (p) {
                return (
                  <button key={p.id} className={"preset" + (presetId === p.id ? " on" : "")} onClick={function () { setPresetId(p.id); }}>
                    <div style={{ fontWeight: 800, fontSize: 13 }}>{presetId === p.id ? "✓ " : ""}{p.label}</div>
                    <div className="muted">{p.desc}</div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="row">
            <label className="label">参考画像（任意・似せて生成）</label>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <label className="btn2" style={{ display: "inline-block" }}>
                📎 参考画像を選ぶ
                <input type="file" accept="image/*" style={{ display: "none" }} onChange={onRefFile} />
              </label>
              {refImage ? (
                <span className="pill">✓ 参考画像あり
                  <button className="btn2" style={{ borderColor: "#B23A1E", color: "#B23A1E" }} onClick={function () { setRefImage(""); }}>× 外す</button>
                </span>
              ) : null}
              {refImage ? <img src={refImage} alt="参考" style={{ height: 56, borderRadius: 8, border: "2px solid #E4DFD3" }} /> : null}
            </div>
            <div className="muted" style={{ marginTop: 6 }}>アップロードした画像の色調・雰囲気・構図に似せて生成します。</div>
          </div>

          <div style={{ textAlign: "center", marginTop: 8 }}>
            <button className="btn" onClick={run} disabled={!!busy}>✨ 書影を作る</button>
            <div className="muted" style={{ marginTop: 8 }}>生成には30秒〜1分ほどかかります。</div>
          </div>
          {busy ? <div style={{ marginTop: 14, background: "#ECF5EF", border: "2px solid #BBDEC8", borderRadius: 12, padding: "12px 16px", fontWeight: 800, color: "#0B5C2E", fontSize: 13 }}>{busy}</div> : null}
          {err ? <div className="err">⚠ {err}</div> : null}

          {hasBg ? (
            <div className="adj">
              <div className="label" style={{ marginBottom: 12 }}>仕上がりの微調整（再生成せず即反映）</div>
              <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>タイトル位置</span>
                <Seg value={pos} onChange={setPos} opts={[{ v: "top", label: "上" }, { v: "center", label: "中央" }, { v: "bottom", label: "下" }]} /></div>
              <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>文字の大きさ</span>
                <input type="range" min="0.6" max="1.6" step="0.05" value={tscale} onChange={function (e) { setTscale(parseFloat(e.target.value)); }} style={{ flex: 1, minWidth: 120 }} /></div>
              <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>文字色</span>
                <span style={{ display: "inline-flex", gap: 8, alignItems: "center" }}>
                  <button className="btn2" onClick={function () { setTcolor("#FFFFFF"); }}>白</button>
                  <button className="btn2" onClick={function () { setTcolor("#222222"); }}>黒</button>
                  <input type="color" value={tcolor} onChange={function (e) { setTcolor(e.target.value); }} style={{ width: 38, height: 30, border: "none", background: "none" }} />
                </span></div>
              <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>文字の下地</span>
                <Seg value={plate} onChange={setPlate} opts={[{ v: "none", label: "なし" }, { v: "soft", label: "うすめ" }, { v: "strong", label: "しっかり" }]} /></div>
            </div>
          ) : null}
        </div>

        <div>
          <div className="card" style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14, background: "#FAF8F2", position: "sticky", top: 16 }}>
            <div className="label" style={{ alignSelf: "flex-start" }}>● プレビュー（四六判 188×128mm）</div>
            {cover
              ? <img src={cover} alt="書影" style={{ width: "100%", maxWidth: 300, borderRadius: 6, boxShadow: "0 14px 36px rgba(0,0,0,0.28)" }} />
              : <div style={{ width: "100%", maxWidth: 280, aspectRatio: COVER.w + "/" + COVER.h, border: "2.5px dashed #E4DFD3", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", color: "#8A8472", fontSize: 13, textAlign: "center", padding: 16 }}>ここに完成書影が表示されます</div>}
            {cover ? <button className="btn" onClick={save}>📥 PNGで保存</button> : null}
            {cover ? <div className="muted" style={{ textAlign: "center" }}>左の「微調整」で位置・大きさ・色・下地を変えると、その場で反映されます。画風や内容を変えたい時は「書影を作る」で作り直し。</div> : null}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
