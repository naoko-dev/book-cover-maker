      });
      setCover(png);
    } catch (e) { setErr("文字の書き出しに失敗しました（CORS制限の可能性）。"); }
  }
  useEffect(function () { if (hasBg) recompose(); }, [title, author, obi, pos, tscale, tcolor, vertical, dx, dy, activeFont, hasBg]);

  function onRefFile(e) {
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var r = new FileReader(); r.onload = function () { setRefImage(String(r.result)); }; r.readAsDataURL(f);
  }

  function run() {
    setErr("");
    if (!title.trim()) { setErr("タイトルを入力してください。"); return; }
    var prompt = buildPrompt(preset, genre.trim(), theme.trim());
    if (refImage) prompt = prompt + " 添付の参考画像の色調・雰囲気・構図に似せること（ただし文字は描かない）。";
    setBusy("AIがイラストを生成しています…（1〜2分ほど）");
    var body = { prompt: prompt, size: "portrait" };
    if (refImage) {
      var parts = refImage.split(","); body.reference = parts[1];
      var m = refImage.match(/^data:([^;]+);/); body.referenceMime = m ? m[1] : "image/png";
    }
    fetch(IMG_FN, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUBLISHABLE_KEY, "apikey": PUBLISHABLE_KEY },
      body: JSON.stringify(body),
    }).then(function (r) { return r.text().then(function (t) { return { ok: r.ok, status: r.status, t: t }; }); })
      .then(function (res) {
        var data = null; try { data = JSON.parse(res.t); } catch (e) {}
        if (!res.ok) throw new Error((data && (data.error || data.message)) || ("サーバーエラー " + res.status));
        if (data && data.error) throw new Error(typeof data.error === "string" ? data.error : "生成エラー");
        var url = extractImage(data);
        if (!url) throw new Error("画像が取得できませんでした");
        setBusy("文字を組版しています…");
        return loadImg(url, true).catch(function () { return loadImg(url, false); });
      })
      .then(function (img) {
        bgRef.current = img;
        setActiveFont(preset.font); setActiveObi({ c: preset.obiColor, t: preset.obiTextColor });
        setPos(preset.pos); setTcolor(preset.color); setTscale(preset.tscale || 1); setVertical(!!preset.vertical);
        setDx(0); setDy(0);
        setBusy(""); setHasBg(true);
      })
      .catch(function (e) { setErr("生成に失敗しました：" + (e && e.message ? e.message : "不明なエラー")); setBusy(""); });
  }

  function save() {
    if (!cover) return;
    var link = document.createElement("a");
    link.href = cover; link.download = (title || "書影").replace(/[\\/:*?"<>|]/g, "_") + "_書影_四六判.png";
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  }

  function Seg(props) {
    return (
      <div className="seg">
        {props.opts.map(function (op) {
          return <button key={op.v} className={props.value === op.v ? "on" : ""} onClick={function () { props.onChange(op.v); }}>{op.label}</button>;
        })}
      </div>
    );
  }

  return (
    <div>
      <div className="topbar"></div>
      <header className="app">
        <div className="brand">
          <span className="badge">GLO</span>
          <span className="brandname"><span style={{ color: C.green }}>書影</span>メーカー</span>
          <span className="ver">v1</span>
        </div>
      </header>

      <div className="wrap">
        <div style={{ marginBottom: 18 }}>
          <h2 className="title">📕 書影（ブックカバー）を作る</h2>
          <p className="lead">タイトル・著者名・内容・デザインを選んで<strong style={{ color: C.greenDeep }}>「書影を作る」</strong>を押すだけ。あなた専用の表紙イラストをAIが生成し、タイトル・帯をきれいに組んで完成書影にします。サイズは四六判（仕上がり188×128mm）。日本語の文字は崩れずきれいに表示されます。</p>
        </div>

        <div className="grid">
          <div className="card">
            <div className="row"><label className="label">タイトル</label><input className="inp" value={title} onChange={function (e) { setTitle(e.target.value); }} placeholder="作品タイトル" /></div>
            <div className="row"><label className="label">著者名・ペンネーム（任意）</label><input className="inp" value={author} onChange={function (e) { setAuthor(e.target.value); }} placeholder="例：白川 ことね" /></div>
            <div className="row"><label className="label">帯（オビ）のキャッチコピー（任意）</label><input className="inp" value={obi} onChange={function (e) { setObi(e.target.value); }} placeholder="例：もう一度、恋をしてもいいですか。（空なら帯なし）" /></div>
            <div className="row"><label className="label">ジャンル（任意）</label><input className="inp" value={genre} onChange={function (e) { setGenre(e.target.value); }} placeholder="例：恋愛小説／ミステリー／実用書／エッセイ" /></div>
            <div className="row"><label className="label">作品の内容・世界観（任意）</label><textarea className="inp" rows="2" value={theme} onChange={function (e) { setTheme(e.target.value); }} placeholder="例：温泉地を舞台にした大人の再生の物語" /></div>

            <div className="row">
              <label className="label">書影デザインプリセット</label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {PRESETS.map(function (p) {
                  return (
                    <button key={p.id} className={"preset" + (presetId === p.id ? " on" : "")} onClick={function () { setPresetId(p.id); }}>
                      <div style={{ fontWeight: 800, fontSize: 13, color: presetId === p.id ? C.greenDark : C.ink }}>{presetId === p.id ? "✓ " : ""}{p.label}</div>
                      <div className="muted">{p.desc}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="row">
              <label className="label">参考画像（任意・似せて生成）</label>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <label className="btn2" style={{ display: "inline-block" }}>
                  📎 参考画像を選ぶ
                  <input type="file" accept="image/*" style={{ display: "none" }} onChange={onRefFile} />
                </label>
                {refImage ? (
                  <span className="pill">✓ 参考画像あり
                    <button className="btn2" style={{ borderColor: C.red, color: C.red }} onClick={function () { setRefImage(""); }}>× 外す</button>
                  </span>
                ) : null}
                {refImage ? <img src={refImage} alt="参考" style={{ height: 56, borderRadius: 8, border: "2px solid " + C.line }} /> : null}
              </div>
              <div className="muted" style={{ marginTop: 6 }}>アップロードした画像の色調・雰囲気・構図に似せて生成します。</div>
            </div>

            <div style={{ textAlign: "center", marginTop: 8 }}>
              <button className="btn" onClick={run} disabled={!!busy}>✨ 書影を作る</button>
              <div className="muted" style={{ marginTop: 8 }}>生成には1〜2分ほどかかります。</div>
            </div>
            {busy ? <div className="info">{busy}</div> : null}
            {err ? <div className="err">⚠ {err}</div> : null}

            {hasBg ? (
              <div className="adj">
                <div className="label" style={{ marginBottom: 12 }}>仕上がりの微調整（再生成せず即反映）</div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>タイトルの向き</span>
                  <Seg value={vertical ? "v" : "h"} onChange={function (v) { setVertical(v === "v"); }} opts={[{ v: "v", label: "縦書き" }, { v: "h", label: "横書き" }]} /></div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>フォント</span>
                  <Seg value={activeFont} onChange={setActiveFont} opts={FONT_OPTIONS} /></div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>位置の目安</span>
                  <Seg value={pos} onChange={setPos} opts={[{ v: "top", label: "上" }, { v: "center", label: "中央" }, { v: "bottom", label: "下" }]} /></div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>左右の位置</span>
                  <input type="range" min="-1" max="1" step="0.02" value={dx} onChange={function (e) { setDx(parseFloat(e.target.value)); }} style={{ flex: 1, minWidth: 120, accentColor: C.green }} /></div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>上下の微調整</span>
                  <input type="range" min="-1" max="1" step="0.02" value={dy} onChange={function (e) { setDy(parseFloat(e.target.value)); }} style={{ flex: 1, minWidth: 120, accentColor: C.green }} /></div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>文字の大きさ</span>
                  <input type="range" min="0.6" max="1.6" step="0.05" value={tscale} onChange={function (e) { setTscale(parseFloat(e.target.value)); }} style={{ flex: 1, minWidth: 120, accentColor: C.green }} /></div>
                <div className="adjrow"><span className="muted" style={{ fontWeight: 800 }}>文字色</span>
                  <span style={{ display: "inline-flex", gap: 8, alignItems: "center" }}>
                    <button className="btn2" onClick={function () { setTcolor("#FFFFFF"); }}>白</button>
                    <button className="btn2" onClick={function () { setTcolor("#222222"); }}>黒</button>
                    <input type="color" value={tcolor} onChange={function (e) { setTcolor(e.target.value); }} style={{ width: 38, height: 30, border: "none", background: "none" }} />
                  </span></div>
              </div>
            ) : null}
          </div>

          <div>
            <div className="card" style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14, background: "#F4FAF6", position: "sticky", top: 80 }}>
              <div className="label" style={{ alignSelf: "flex-start" }}>● プレビュー（四六判 188×128mm）</div>
              {cover
                ? <img src={cover} alt="書影" style={{ width: "100%", maxWidth: 300, borderRadius: 6, boxShadow: "0 14px 36px rgba(0,0,0,0.28)" }} />
                : <div style={{ width: "100%", maxWidth: 280, aspectRatio: COVER.w + "/" + COVER.h, border: "2.5px dashed " + C.line, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", color: C.inkSoft, fontSize: 13, textAlign: "center", padding: 16, background: "#fff" }}>ここに完成書影が表示されます</div>}
              {cover ? <button className="btn" onClick={save}>📥 PNGで保存</button> : null}
              {cover ? <div className="muted" style={{ textAlign: "center" }}>左の「微調整」で向き・フォント・位置（左右/上下）・大きさ・色を変えると、その場で反映されます。画風や内容を変えたい時は「書影を作る」で作り直し。</div> : null}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
